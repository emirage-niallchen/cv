# Cloudflare Wrangler 配置文件
name = "trackresume"
main = "src/index.ts"
compatibility_date = "2025-06-30"

# D1 数据库配置
[[d1_databases]]
binding = "DB"
database_name = "track_resume"
database_id = "4b085a13-b667-4df1-a11c-37505c53b783"

# 环境变量
[vars]
NODE_ENV = "production"

# 构建配置
[build]
command = "npm run build"

# 部署配置
[env.production]
name = "track_resume-prod"

[env.staging]
name = "track_resume-staging" 